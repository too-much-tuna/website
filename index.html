<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul Tao</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', Helvetica Neue, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            text-align: center;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.1s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .status {
            font-size: clamp(1.1rem, 2.5vw, 1.35rem);
            font-weight: 300;
            letter-spacing: 0.02em;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.03em;
            transition: color 0.2s ease;
        }

        .links a:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <p class="status">Under construction in Los Angeles, CA</p>
        <div class="links">
            <a href="mailto:paultao@gmail.com">Email</a>
            <a href="https://www.linkedin.com/in/paultao" target="_blank" rel="noopener">LinkedIn</a>
            <a href="https://www.instagram.com/paultao" target="_blank" rel="noopener">Instagram</a>
            <a href="https://inprogress.ing" target="_blank" rel="noopener">In Progress</a>
        </div>
    </div>
</body>
</html>
