<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul Tao</title>
    <meta name="description" content="Paul Tao — Creative producer and strategist based in Los Angeles.">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Social -->
    <meta property="og:title" content="Paul Tao">
    <meta property="og:description" content="Under construction in Los Angeles, CA">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://paultao.com">
    <meta name="twitter:card" content="summary">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'><rect fill='%23fff' width='1' height='1'/></svg>">

    <link rel="canonical" href="https://paultao.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', Helvetica Neue, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            text-align: center;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.1s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .status {
            font-size: clamp(1.1rem, 2.5vw, 1.35rem);
            font-weight: 300;
            letter-spacing: 0.02em;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.03em;
            transition: color 0.2s ease;
        }

        .links a:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <p class="status">Under construction in Los Angeles, CA</p>
        <div class="links">
            <a href="#" id="email-link">Email</a>
            <a href="https://www.linkedin.com/in/paultao" target="_blank" rel="noopener">LinkedIn</a>
            <a href="https://www.instagram.com/paultao" target="_blank" rel="noopener">Instagram</a>
            <a href="https://inprogress.ing" target="_blank" rel="noopener">In Progress</a>
        </div>
    </div>
    <script>
        // Obfuscated email to prevent spam scraping
        (function() {
            var u = 'paultao';
            var d = 'gmail.com';
            var el = document.getElementById('email-link');
            el.href = 'mai' + 'lto:' + u + '@' + d;
        })();
    </script>
</body>
</html>
